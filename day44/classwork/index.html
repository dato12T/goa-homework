<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Responsive Box</title>
  <style>
    .box {
      width: 200px;
      height: 200px;
      background-color: red; 
    }

    @media (max-width: 800px) {
      .box {
        background-color: yellow;
      }
    }

    @media (max-width: 400px) {
      .box {
        background-color: blue;
      }
    }
  </style>
</head>
<body>

  <div class="box"></div>

</body>
</html>
